<div class="p-4 flex justify-content-center">
  <div class="w-full" style="max-width: 900px;">
    <p-card styleClass="mb-4 shadow-2">

      <!-- HEADER -->
      <ng-template pTemplate="header">
        <div class="flex justify-content-between align-items-center w-full px-3 pt-3">
          <h5 class="m-0">📰 Noticias</h5>
          <button
            *ngIf="auth.isAdmin()"
            pButton
            icon="pi pi-plus"
            label="Nuevo"
            class="p-button-sm p-button-success"
            (click)="nuevoAviso()">
          </button>
        </div>
      </ng-template>

      <!-- CONTENIDO -->
      <div class="flex flex-column align-items-center justify-content-center text-center"
           style="min-height: 450px;">

        <!-- VACÍO -->
        <div *ngIf="imagenes.length === 0"
             class="flex flex-column align-items-center gap-2"
             style="color: var(--text-color-secondary); padding: 60px 0;">
          <i class="pi pi-inbox" style="font-size: 3rem; opacity: 0.35;"></i>
          <span>No hay avisos publicados</span>
        </div>

        <!-- CAROUSEL -->
        <p-carousel
          *ngIf="imagenes.length > 0"
          [value]="imagenes"
          [numVisible]="1"
          [numScroll]="1"
          [circular]="true"
          [autoplayInterval]="3000"
          styleClass="w-full"
        >
          <!-- ✅ let-img recibe el objeto completo con su id -->
          <ng-template let-img pTemplate="item">
            <div class="flex flex-column align-items-center pb-4 px-2">

              <!-- IMAGEN -->
              <img
                [src]="img.url || 'assets/placeholder.png'"
                style="width: 350px; max-width: 100%; height: 350px;
                       object-fit: cover; border-radius: 12px;
                       box-shadow: 0 2px 12px rgba(0,0,0,0.1);"
              />

              <!-- TEXTO -->
              <div class="mt-3" style="max-width: 420px;">
                <h5 class="mb-1 m-0">{{ img.titulo }}</h5>
                <p class="text-color-secondary mt-1 mb-0">{{ img.descripcion }}</p>
              </div>

              <!-- ACCIONES -->
              <div *ngIf="auth.isAdmin()" class="flex gap-2 mt-3">
                <!-- ✅ Pasa img completo, no el índice -->
                <button
                  pButton
                  icon="pi pi-pencil"
                  label="Editar"
                  class="p-button-sm p-button-warning"
                  (click)="editarCarrusel(img)">
                </button>
                <button
                  pButton
                  icon="pi pi-trash"
                  label="Eliminar"
                  class="p-button-sm p-button-danger"
                  (click)="eliminarAviso(img.id)">
                </button>
              </div>

            </div>
          </ng-template>
        </p-carousel>

      </div>
    </p-card>
  </div>
</div>


<!-- ─── DIALOG ─── -->
<p-dialog
  [header]="imagenEditando.id ? 'Editar aviso' : 'Nuevo aviso'"
  [(visible)]="dialogVisible"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [style]="{ width: '440px' }"
>
  <div class="flex flex-column gap-3 pt-2">

    <!-- IMAGEN -->
    <div class="flex flex-column gap-1">
      <label class="font-medium">Imagen</label>

      <!-- Preview -->
      <img
        *ngIf="imagenEditando.url"
        [src]="imagenEditando.url"
        style="width: 100%; max-height: 200px; object-fit: cover;
               border-radius: 8px; border: 1px solid var(--surface-border);"
      />

      <!-- Placeholder vacío -->
      <div *ngIf="!imagenEditando.url"
           class="flex align-items-center justify-content-center"
           style="width: 100%; height: 120px; border-radius: 8px;
                  border: 2px dashed var(--surface-border);
                  color: var(--text-color-secondary); font-size: 0.875rem;">
        <span><i class="pi pi-image mr-2"></i>Sin imagen</span>
      </div>

      <input
        type="file"
        accept="image/*"
        (change)="onFileSelect($event)"
        style="margin-top: 6px; font-size: 0.875rem;"
      />
      <small class="text-color-secondary">Máximo 1 MB · JPG, PNG, WEBP</small>

      <!-- Error imagen -->
      <small *ngIf="errores.imagen" class="p-error">
        <i class="pi pi-exclamation-circle mr-1"></i>{{ errores.imagen }}
      </small>
    </div>

    <!-- TÍTULO -->
    <div class="flex flex-column gap-1">
      <label class="font-medium" for="inp-titulo">Título</label>
      <input
        id="inp-titulo"
        type="text"
        pInputText
        [(ngModel)]="imagenEditando.titulo"
        placeholder="Ej: Reunión de padres"
        [ngClass]="{ 'ng-invalid ng-dirty': errores.titulo }"
        class="w-full"
      />
      <small *ngIf="errores.titulo" class="p-error">
        <i class="pi pi-exclamation-circle mr-1"></i>{{ errores.titulo }}
      </small>
    </div>

    <!-- DESCRIPCIÓN -->
    <div class="flex flex-column gap-1">
      <label class="font-medium" for="inp-desc">Descripción</label>
      <input
        id="inp-desc"
        pInputTextarea
        [(ngModel)]="imagenEditando.descripcion"
        placeholder="Breve descripción del aviso..."
        rows="3"
        [ngClass]="{ 'ng-invalid ng-dirty': errores.descripcion }"
        class="w-full"
      />
      <small *ngIf="errores.descripcion" class="p-error">
        <i class="pi pi-exclamation-circle mr-1"></i>{{ errores.descripcion }}
      </small>
    </div>

  </div>

  <!-- FOOTER -->
  <ng-template pTemplate="footer">
    <button
      pButton
      label="Cancelar"
      icon="pi pi-times"
      class="p-button-text p-button-secondary"
      (click)="dialogVisible = false">
    </button>
    <button
      pButton
      label="Guardar"
      icon="pi pi-check"
      class="p-button-success"
      (click)="guardarCambios()">
    </button>
  </ng-template>
</p-dialog>
