<div class="p-4 flex justify-content-center">
  <div class="w-full" style="max-width: 900px;">
    <p-card styleClass="mb-4 shadow-2">

      <!-- HEADER -->
      <ng-template pTemplate="header">
        <div class="flex justify-content-between align-items-center w-full">
          <h5 class="m-0">📰 Noticias</h5>

          <!-- BOTÓN NUEVO -->
          <button 
            *ngIf="auth.isAdmin()"
            pButton 
            icon="pi pi-plus"
            label="Nuevo"
            class="p-button-sm p-button-success"
            (click)="nuevoAviso()">
          </button>
        </div>
      </ng-template>

      <!-- CONTENIDO -->
      <div class="flex flex-column align-items-center justify-content-center text-center" style="min-height: 450px;">

        <p-carousel 
          [value]="imagenes" 
          [numVisible]="1" 
          [numScroll]="1" 
          [circular]="true"
          [autoplayInterval]="3000"
        >

          <ng-template let-img let-i="index" pTemplate="item">

            <div class="flex flex-column align-items-center">

              <!-- IMAGEN -->
              <img 
                [src]="img.url || 'https://via.placeholder.com/350x350?text=Sin+imagen'"
                style="width: 350px; max-width: 100%; height: 350px; object-fit: cover; border-radius: 12px;"
              />

              <!-- TEXTO -->
              <div class="mt-3">
                <h5 class="mb-1">{{ img.titulo }}</h5>
                <p class="text-color-secondary mb-0">
                  {{ img.descripcion }}
                </p>
              </div>

              <!-- ACCIONES -->
              <div *ngIf="auth.isAdmin()" class="flex gap-2 mt-3">

                <!-- EDITAR -->
                <button 
                  pButton 
                  icon="pi pi-pencil"
                  class="p-button-sm p-button-warning"
                  (click)="editarCarrusel(i)">
                </button>

                <!-- ELIMINAR -->
                <button 
                  pButton 
                  icon="pi pi-trash"
                  class="p-button-sm p-button-danger"
                  (click)="eliminarAviso(img.id)">
                </button>

              </div>

            </div>

          </ng-template>

        </p-carousel>

      </div>

    </p-card>
  </div>
</div>

<!-- DIALOG -->
<p-dialog 
  [header]="imagenEditando.id ? 'Editar Aviso' : 'Nuevo Aviso'"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '400px' }"
>

  <div class="flex flex-column gap-3">

    <!-- IMAGEN -->
    <div>
      <label>Imagen</label>
      <input type="file" (change)="onFileSelect($event)" />

      <img 
        *ngIf="imagenEditando.url"
        [src]="imagenEditando.url"
        style="width: 100%; border-radius: 8px; margin-top:10px;"
      />
    </div>

    <!-- TITULO -->
    <div>
      <label>Título</label>
      <input type="text" pInputText [(ngModel)]="imagenEditando.titulo" class="w-full"/>
    </div>

    <!-- DESCRIPCIÓN -->
    <div>
      <label>Descripción</label>
      <input type="text" pInputText [(ngModel)]="imagenEditando.descripcion" class="w-full"/>
    </div>

  </div>

  <!-- FOOTER -->
  <ng-template pTemplate="footer">
    <button 
      pButton 
      label="Cancelar" 
      class="p-button-text"
      (click)="dialogVisible = false">
    </button>

    <button 
      pButton 
      label="Guardar" 
      class="p-button-success"
      (click)="guardarCambios()">
    </button>
  </ng-template>

</p-dialog>
