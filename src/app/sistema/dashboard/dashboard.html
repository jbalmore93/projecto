<div class="p-4 flex justify-content-center">
  <div class="w-full" style="max-width: 900px;">
  <p-card styleClass="mb-4 shadow-2">

    <!-- HEADER -->
    <ng-template pTemplate="header">
      <div class="flex justify-content-between align-items-center w-full">
        <h5 class="m-0">📰 Noticias</h5>
      </div>
    </ng-template>

   
    <div class="flex flex-column align-items-center justify-content-center text-center" style="min-height: 450px;">

      <p-carousel 
        [value]="imagenes" 
        [numVisible]="1" 
        [numScroll]="1" 
        [circular]="true"
        [autoplayInterval]="3000"
      >
        <ng-template let-img let-i="index" pTemplate="item">

          <div class="flex flex-column align-items-center">

            <!-- IMAGEN -->
            <img 
              [src]="img.url"
              style="width: 350px; max-width: 100%; height: 350px; object-fit: cover; border-radius: 12px;"
            />

            <!-- TEXTO -->
            <div class="mt-3">
              <h5 class="mb-1">{{ img.titulo }}</h5>
              <p class="text-color-secondary mb-0">
                {{ img.descripcion }}
              </p>
            </div>

            <!-- BOTÓN EDITAR -->
            <button 
              *ngIf="auth.isAdmin()"
              pButton 
              icon="pi pi-pencil"
              class="p-button-sm p-button-warning mt-3"
              (click)="editarCarrusel(i)">
            </button>

          </div>

        </ng-template>
      </p-carousel>

    </div>

  </p-card>

</div>
</div>
<p-dialog 
  header="Editar Imagen"
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '400px' }"
>

  <div class="flex flex-column gap-3">
<div>
   <label>Imagen</label>
    <input 
      type="file"
      (change)="onFileSelect($event)"
    />

    <!-- PREVIEW -->
    <img 
      *ngIf="imagenEditando.url"
      [src]="imagenEditando.url"
      style="width: 100%; border-radius: 8px;"
    />
</div>
  
<div class="mt-2">
 <!-- TITULO -->
    <label class="mt-2">Título</label>
    <input 
      type="text" 
      pInputText 
      [(ngModel)]="imagenEditando.titulo"
    />

</div>
   <div class="mt-2">
    <!-- DESCRIPCIÓN -->
    <label class="mt-2">Descripción</label>
    <input 
      type="text" 
      pInputText 
      [(ngModel)]="imagenEditando.descripcion"
    />
   </div>
  </div>

  <!-- BOTONES -->
  <ng-template pTemplate="footer">
    <button 
      pButton 
      label="Cancelar" 
      class="p-button-text"
      (click)="dialogVisible = false">
    </button>

    <button 
      pButton 
      label="Guardar" 
      class="p-button-success"
      (click)="guardarCambios()">
    </button>
  </ng-template>

</p-dialog>
