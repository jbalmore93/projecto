<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">
    
    <div class="text-center mb-3">
      <img src="logo.jpeg" class="img-fluid" style="max-width: 200px;">
    </div>
    
    <div class="text-center mb-4">
      <p class="text-muted">Ingrese sus credenciales</p>
    </div>

    <!-- SESIÓN EXPIRADA -->
    <div class="alert alert-warning py-2 text-center" *ngIf="sessionExpired">
      <i class="bi bi-clock-history me-2"></i>Tu sesión ha expirado. Por favor inicia sesión nuevamente.
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" novalidate>
      
      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input 
          type="email"
          class="form-control"
          name="usuario"
          [(ngModel)]="usuario"
          #email="ngModel"
          required
          email
          [class.is-invalid]="email.invalid && email.touched">
        <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
          <div *ngIf="email.errors?.['required']">El correo es obligatorio</div>
          <div *ngIf="email.errors?.['email']">Formato de correo inválido</div>
        </div>
      </div>
      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input 
          type="password"
          class="form-control"
          name="password"
          [(ngModel)]="pass"
          #passwordField="ngModel"
          required
          minlength="6"
          [class.is-invalid]="passwordField.invalid && passwordField.touched">
        <div class="invalid-feedback" *ngIf="passwordField.invalid && passwordField.touched">
          <div *ngIf="passwordField.errors?.['required']">La contraseña es obligatoria</div>
          <div *ngIf="passwordField.errors?.['minlength']">Mínimo 6 caracteres</div>
        </div>
      </div>

      <!-- ERROR -->
      <div class="alert alert-danger py-2" *ngIf="error">
        <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
        <span *ngIf="bloqueado" class="fw-bold ms-1">({{ tiempoFormateado }})</span>
      </div>

      <!-- BOTÓN -->
      <div class="d-grid">
        <button 
          class="btn btn-success"
          type="submit"
          [disabled]="loginForm.invalid || cargando || bloqueado">
          <span 
            *ngIf="cargando"
            class="spinner-border spinner-border-sm me-2"
            role="status">
          </span>
          <i *ngIf="bloqueado" class="bi bi-lock-fill me-2"></i>
          {{ cargando ? 'Ingresando...' : bloqueado ? 'Bloqueado ' + tiempoFormateado : 'Ingresar' }}
        </button>
      </div>

    </form>
  </div>
</div>
